name: バグ報告
description: 不具合や想定外の動作について報告します
title: ""
labels: ["bug", "triage"]
assignees:
  - your-username
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: どんな問題が発生したのか、簡潔に説明してください。
      placeholder: アプリ起動時にクラッシュが発生します。
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: 問題を再現できる手順を番号付きで記述してください。
      placeholder: |
        1. アプリを起動
        2. ホーム画面で設定を開く
        3. クラッシュする
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期待される動作
      description: 本来どう動作するべきかを記載してください。
      placeholder: 設定画面が表示されるはずです。
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: 補助資料
      description: エラー内容や画像などがあれば記載してください。
      placeholder: スクリーンショットやログ出力など
      render: shell

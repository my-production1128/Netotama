name: バグ報告（bug）
description: バグを報告する
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        以下の情報を記入してください。

  - type: textarea
    id: description
    attributes:
      label: バグの概要
      description: バグの内容を詳しく説明してください
      placeholder: できるだけ具体的に記述してください
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 再現手順
      description: バグを再現するための手順を記述してください
      placeholder: |
        1. '...' に移動
        2. '....' をクリック
        3. '....' までスクロール
        4. エラーが発生
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
      description: 本来期待される動作を記述してください
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: 補助資料（ログ・スクリーンショットなど）
      description: エラー内容や画像などがあれば記載してください。
      placeholder: スクリーンショットやログ出力など
      render: shell
